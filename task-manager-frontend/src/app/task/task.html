<!-- Add Task Form -->
<div class="form-card">
  <h3>Add New Task</h3>

  <div *ngIf="successMessage" class="msg success">{{ successMessage }}</div>
  <div *ngIf="errorMessage"   class="msg error">{{ errorMessage }}</div>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label>Title</label>
      <input formControlName="title" placeholder="Enter task title" />
      <span class="err" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
        Title is required
      </span>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea formControlName="description" placeholder="Enter description" rows="3"></textarea>
      <span class="err" *ngIf="taskForm.get('description')?.invalid && taskForm.get('description')?.touched">
        Description is required
      </span>
    </div>

    <div class="field">
      <label>Status</label>
      <select formControlName="status">
        <option value="PENDING">Pending</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="COMPLETED">Completed</option>
        <option value="CANCELLED">Cancelled</option>
      </select>
    </div>

    <button type="submit" [disabled]="taskForm.invalid || isSubmitting">
      {{ isSubmitting ? 'Adding...' : 'Add Task' }}
    </button>

  </form>
</div>

<!-- Task List -->
<div class="list-card">
  <h3>Task List</h3>

  <div *ngIf="tasks.length > 0; else noData">
    <div class="task-item" *ngFor="let task of tasks">
      <span class="task-title">{{ task.title }}</span>
      <span class="badge" [ngClass]="task.status.toLowerCase().replace('_', '-')">
        {{ task.status }}
      </span>
      <button (click)="updateStatus(task)">Change Status</button>
      <button (click)="deleteTask(task.id)">Delete</button>
    </div>

  </div>

  <ng-template #noData>
    <p class="empty">No tasks yet. Add one above!</p>
  </ng-template>
</div>
<h1 class="text-red-500 text-3xl">Test</h1>
