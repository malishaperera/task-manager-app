<div class="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 flex items-center justify-center">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8">
      <div class="bg-gray-900 text-white w-10 h-10 rounded-xl flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900">Task Manager</h1>
        <p class="text-xs text-gray-400">Manage your tasks efficiently</p>
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-1">Welcome back</h2>
    <p class="text-sm text-gray-400 mb-6">Sign in to your account</p>

    <!-- Error -->
    <div *ngIf="error()"
         class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-4">
      ⚠️ {{ error() }}
    </div>

    <!-- Username -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input
        [value]="username()"
        (input)="username.set($any($event.target).value)"
        type="text"
        placeholder="Enter your username"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition"
      />
    </div>

    <!-- Password -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        type="password"
        placeholder="Enter your password"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition"
      />
    </div>

    <!-- Button -->
    <button
      (click)="login()"
      class="w-full bg-gray-900 hover:bg-gray-700 text-white font-medium py-3 rounded-xl transition text-sm"
    >
      Sign In →
    </button>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 Task Manager. Intern Project.
    </p>

  </div>
</div>
