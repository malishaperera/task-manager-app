<div class="p-8 bg-gray-100 min-h-screen mb-66">

  <!-- Top  -->
  <p class="text-sm text-gray-400 mb-2">
    Dashboard / <span class="text-gray-700 font-medium">Add New Task</span>
  </p>

  <!-- Title -->
  <h1 class="text-3xl font-semibold mb-8">Task Creation</h1>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-md max-w-2xl mx-auto overflow-hidden">

    <!-- Card header -->
    <div class="bg-gray-50 px-6 py-4 border-b flex items-center gap-3">
      <div class="bg-black text-white p-2 rounded-lg">
        📄
      </div>
      <div>
        <h2 class="font-semibold">Create New Task</h2>
        <p class="text-sm text-gray-500">
          Define the details of your next objective.
        </p>
      </div>
    </div>

    <!-- Form -->
    <div class="p-6">

      <!-- Title -->
      <div class="mb-5">
        <label class="block text-sm font-medium mb-1">Task Title *</label>
        <input
          type="text"
          [(ngModel)]="title"
          class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
          placeholder="e.g. Conduct user research for landing page"
        />
      </div>

      <!-- Status -->
      <div class="mb-5">
        <label class="block text-sm font-medium mb-1">Priority Status</label>
        <select
          [(ngModel)]="status"
          class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
        >
          <option>PENDING</option>
          <option>IN_PROGRESS</option>
          <option>COMPLETED</option>
          <option>CANCELLED</option>

        </select>
      </div>

      <!-- Description -->
      <div class="mb-5">
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea
          [(ngModel)]="description"
          class="w-full border rounded-lg p-3 h-28 focus:outline-none focus:ring-2 focus:ring-black"
          placeholder="Add some context or specific steps..."
        ></textarea>
      </div>

      <!-- Tip -->
      <div class="bg-gray-50 border rounded-lg p-3 text-sm text-gray-500 mb-6">
        💡 Quick Tip: Be specific in your titles.
      </div>

      <!-- Bottom -->
      <div class="flex justify-between items-center">

        <a routerLink="/" class="text-gray-500 text-sm hover:underline">
          ← Back to Dashboard
        </a>

        <div class="flex gap-3">
          <button class="border px-4 py-2 rounded-lg hover:bg-gray-100">
            Cancel
          </button>

          <button
            (click)="saveTask()"
            class="bg-black text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition"
          >
            Save Task
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
