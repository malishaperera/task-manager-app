<div class="max-w-2xl mx-auto mt-10">
  <a routerLink="/dashboard" class="text-sm text-gray-500 hover:underline mb-4 inline-block">
    ← Back to Dashboard
  </a>

  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6">

    <h2 class="text-xl font-semibold mb-1">Edit Task</h2>
    <p class="text-sm text-gray-500 mb-6">
      Update the details and current progress of your task.
    </p>

    <!-- USER alert -->
    <div *ngIf="!isAdmin()"
         class="bg-yellow-50 border border-yellow-300 text-yellow-800 text-sm px-4 py-3 rounded-xl mb-5 flex items-center gap-2">
      ⚠️ You can only update the <strong class="ml-1">Status</strong> of this task.
    </div>

    <!-- ADMIN - Title editable -->
    <div class="mb-4" *ngIf="isAdmin()">
      <label class="text-sm font-medium text-gray-700 block mb-1">Task Title *</label>
      <input
        [value]="title()"
        (input)="title.set($any($event.target).value)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black focus:outline-none"
      />
    </div>

    <!-- USER - Title read only -->
    <div class="mb-4" *ngIf="!isAdmin()">
      <label class="text-sm font-medium text-gray-400 block mb-1">Task Title</label>
      <div class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-500">
        {{ title() }}
      </div>
    </div>

    <!-- ADMIN - Description editable -->
    <div class="mb-4" *ngIf="isAdmin()">
      <label class="text-sm font-medium text-gray-700 block mb-1">Description</label>
      <textarea
        rows="4"
        [value]="description()"
        (input)="description.set($any($event.target).value)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black focus:outline-none"
      ></textarea>
      <p class="text-xs text-gray-400 mt-1">Markdown is supported for formatting.</p>
    </div>

    <!-- USER - Description read only -->
    <div class="mb-4" *ngIf="!isAdmin()">
      <label class="text-sm font-medium text-gray-400 block mb-1">Description</label>
      <div class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-500 min-h-[80px]">
        {{ description() }}
      </div>
    </div>

    <!-- Status - සියල්ලටම -->
    <div class="mb-6">
      <label class="text-sm font-medium text-gray-700 block mb-1">Status</label>
      <select
        [value]="status()"
        (change)="setStatus($any($event.target).value)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black focus:outline-none"
      >
        <option>PENDING</option>
        <option>IN_PROGRESS</option>
        <option>COMPLETED</option>
        <option>CANCELLED</option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end gap-3">

      <a routerLink="/dashboard"
      class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100"
      >
      Cancel
      </a>
      <button
        (click)="updateTask()"
        class="px-4 py-2 text-sm bg-black text-white rounded-lg hover:bg-gray-800"
      >
        {{ isAdmin() ? 'Update Task' : 'Update Status' }}
      </button>
    </div>

  </div>
</div>
